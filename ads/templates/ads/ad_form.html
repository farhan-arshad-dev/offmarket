{% extends "base.html" %}
{% block title %}Post your ad{% endblock %}
{% block content %}

        {% csrf_token %}
        {{ form.as_p }}
        <h4>Images</h4>
        {{ image_formset.management_form }}

        <button type="submit">Save</button>
    </form>
{% endblock %}
